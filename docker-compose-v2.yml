# ========================================
# Medical Report Interpreter - v2.0
# Complete Docker Compose with All Features
# ========================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: medical-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medical_secure_password_123}
      POSTGRES_DB: medical
    ports:
      - "5433:5432"  # External port 5433 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: medical-backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-medical_secure_password_123}@postgres:5432/medical
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DEBUG: ${DEBUG:-false}
      UPLOAD_DIR: /app/uploads
      OCR_ENGINE: paddleocr
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      ENABLE_AI_EXPLANATIONS: ${ENABLE_AI:-false}
      ENABLE_PDF_EXPORT: ${ENABLE_PDF:-true}
      ENABLE_SHARING: ${ENABLE_SHARING:-true}
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
      - ./backend:/app  # Development: mount source code
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - medical_network

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: medical-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medical_network

  # Redis (Optional - for caching and session storage)
  redis:
    image: redis:7-alpine
    container_name: medical-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - medical_network
    profiles:
      - full  # Only starts with --profile full

  # NGINX Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: medical-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - medical_network
    profiles:
      - production  # Only starts with --profile production

volumes:
  postgres_data:
    driver: local
  upload_data:
    driver: local
  redis_data:
    driver: local

networks:
  medical_network:
    driver: bridge

# ========================================
# Usage Examples:
# ========================================
# 
# Development (basic):
#   docker-compose up
#
# Development with hot reload:
#   docker-compose up --build
#
# Production with all features:
#   docker-compose --profile production --profile full up -d
#
# Stop all:
#   docker-compose down
#
# Clean everything:
#   docker-compose down -v
#
# View logs:
#   docker-compose logs -f backend
#
# ========================================
